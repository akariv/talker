<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>display-cam sim</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="toolbar">
    <button id="refreshBtn">Refresh</button>
    <span class="endpoint" id="endpoint"></span>
    <a href="index.html">← back to login</a>
</div>
<div class="canvas-frame">
    <canvas id="frame" width="296" height="128"></canvas>
</div>
<div class="status" id="status">…</div>
<script src="sim.js"></script>
<script>
(function () {
    const s = getSettings();
    if (!s) {
        window.location.href = "index.html";
        return;
    }
    document.getElementById("endpoint").textContent =
        `${s.clientName} @ ${s.serverUrl}`;

    const canvas = document.getElementById("frame");
    const status = document.getElementById("status");
    const btn = document.getElementById("refreshBtn");

    async function refresh() {
        btn.disabled = true;
        try { await fetchAndRender(canvas, status); }
        finally { btn.disabled = false; }
    }

    btn.addEventListener("click", refresh);
    refresh();
})();
</script>
</body>
</html>
